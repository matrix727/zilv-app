<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#8b6914">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<title>自律记录</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f5f0eb; color: #3d3226; min-height: 100vh; padding-bottom: 40px;
  }
  .container { max-width: 600px; margin: 0 auto; padding: 20px 16px; }

  header { text-align: center; padding: 28px 0 8px; }
  header h1 { font-size: 26px; font-weight: 700; letter-spacing: 0.04em; color: #4a3728; }
  #clock {
    font-size: 15px; color: #8b7355; margin-top: 6px;
    font-variant-numeric: tabular-nums;
    font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
  }

  .input-area {
    display: flex; gap: 10px; margin: 20px 0 28px;
    position: sticky; top: 12px; z-index: 10;
  }
  .input-area input {
    flex: 1; padding: 14px 18px; border: 2px solid #d4c5b2; border-radius: 14px;
    font-size: 17px; background: #fff; color: #3d3226; outline: none; transition: border-color 0.2s; min-width: 0;
  }
  .input-area input:focus { border-color: #b8956a; }
  .input-area input::placeholder { color: #c4b5a3; }
  .input-area button {
    padding: 14px 24px; background: #8b6914; color: #fff; border: none; border-radius: 14px;
    font-size: 17px; font-weight: 600; cursor: pointer; white-space: nowrap;
    transition: background 0.2s, transform 0.1s;
  }
  .input-area button:hover { background: #6b5010; }
  .input-area button:active { transform: scale(0.97); }

  .quick-actions { display: flex; gap: 8px; flex-wrap: wrap; margin: -12px 0 24px; }
  .quick-actions button {
    padding: 8px 16px; background: #ede4d8; border: 1px solid #d4c5b2; border-radius: 20px;
    font-size: 14px; color: #5c4a32; cursor: pointer; transition: background 0.2s;
  }
  .quick-actions button:hover { background: #ddd2c2; }

  /* Month group */
  .month-group { margin-bottom: 8px; }
  .month-toggle {
    display: flex; align-items: center; gap: 8px; padding: 10px 14px;
    background: #ede4d8; border: none; border-radius: 12px;
    font-size: 16px; font-weight: 700; color: #4a3728;
    cursor: pointer; width: 100%; text-align: left;
    transition: background 0.15s;
  }
  .month-toggle:hover { background: #e0d6c6; }
  .month-arrow { font-size: 12px; transition: transform 0.2s; color: #8b7355; }
  .month-group.collapsed .month-arrow { transform: rotate(-90deg); }
  .month-count { font-size: 13px; color: #8b7355; font-weight: 400; margin-left: auto; }

  /* Day group */
  .day-group { margin: 4px 0 4px 8px; }
  .day-toggle {
    display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    background: transparent; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 600; color: #5c4a32;
    cursor: pointer; width: 100%; text-align: left;
    transition: background 0.15s;
  }
  .day-toggle:hover { background: #f0ebe0; }
  .day-arrow { font-size: 11px; transition: transform 0.2s; color: #b8956a; }
  .day-group.collapsed .day-arrow { transform: rotate(-90deg); }

  .record-list { display: flex; flex-direction: column; gap: 0; padding-left: 8px; }
  .record {
    display: flex; align-items: flex-start; padding: 10px 14px; background: #fff;
    border-radius: 10px; margin-bottom: 6px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }

  .record-time {
    font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
    font-size: 14px; font-weight: 600; color: #5c4a32;
    min-width: 50px; margin-right: 14px; padding-top: 1px;
  }
  .record-body { flex: 1; min-width: 0; }
  .record-activity { font-size: 16px; font-weight: 600; color: #3d3226; }
  .record-dur { font-size: 13px; color: #b8956a; margin-top: 1px; }
  .record-dur.live { color: #8b6914; font-weight: 600; }

  .record-del {
    background: none; border: none; color: #c4b5a3; cursor: pointer;
    font-size: 18px; padding: 4px 8px; border-radius: 6px; line-height: 1;
    flex-shrink: 0; min-width: 32px; text-align: center;
  }
  .record-del:active { color: #d44; background: #fef0f0; }

  .empty {
    text-align: center; color: #c4b5a3; padding: 60px 20px;
    font-size: 16px; line-height: 1.8;
  }
  .empty-icon { font-size: 48px; display: block; margin-bottom: 12px; }

  .collapsed .record-list, .collapsed .day-groups { display: none; }

  @media (max-width: 400px) {
    .container { padding: 12px 10px; }
    .record-time { min-width: 42px; margin-right: 8px; font-size: 13px; }
    .record-activity { font-size: 15px; }
    .input-area input { padding: 12px 14px; font-size: 16px; }
    .input-area button { padding: 12px 16px; font-size: 15px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>自律记录</h1>
    <div id="clock"></div>
  </header>

  <div class="input-area">
    <input id="activityInput" type="text" placeholder="输入正在做的事…" maxlength="40" autofocus autocomplete="off">
    <button id="submitBtn">记录</button>
  </div>
  <div class="quick-actions" id="quickActions"></div>

  <div id="recordGroups"></div>
</div>

<script>
var STORAGE_KEY = 'zilv_records';
var COLLAPSE_KEY = 'zilv_collapse';

function loadRecords() {
  try { var raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : []; }
  catch(e) { return []; }
}
function saveRecords(arr) { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }

function loadCollapse() {
  try { var raw = localStorage.getItem(COLLAPSE_KEY); return raw ? JSON.parse(raw) : {}; }
  catch(e) { return {}; }
}
function saveCollapse(obj) { localStorage.setItem(COLLAPSE_KEY, JSON.stringify(obj)); }

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

function fmtTime(iso) {
  var d = new Date(iso);
  return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false });
}

function fmtDate(iso) {
  var d = new Date(iso);
  var now = new Date();
  var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  var target = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  var diffDays = Math.round((today - target) / 86400000);
  var dateStr = d.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric', weekday: 'short' });
  if (diffDays === 0) return '今天 · ' + dateStr;
  if (diffDays === 1) return '昨天 · ' + dateStr;
  if (diffDays === 2) return '前天 · ' + dateStr;
  return dateStr;
}

function fmtDuration(minutes) {
  if (minutes < 1) return '不到1分钟';
  var h = Math.floor(minutes / 60);
  var m = minutes % 60;
  if (h === 0) return m + ' 分钟';
  if (m === 0) return h + ' 小时';
  return h + ' 小时 ' + m + ' 分钟';
}

// Group records: month -> day -> records (each array is oldest-first from data)
// Display will be reversed to newest-first
function groupAll(recordsArr) {
  var months = [];
  for (var i = 0; i < recordsArr.length; i++) {
    var r = recordsArr[i];
    var d = new Date(r.time);
    var mKey = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    var dKey = mKey + '-' + String(d.getDate()).padStart(2, '0');

    // Find or create month
    var month = null;
    for (var mi = 0; mi < months.length; mi++) {
      if (months[mi].key === mKey) { month = months[mi]; break; }
    }
    if (!month) {
      month = { key: mKey, year: d.getFullYear(), month: d.getMonth() + 1, days: [] };
      months.push(month);
    }

    // Find or create day
    var day = null;
    for (var di = 0; di < month.days.length; di++) {
      if (month.days[di].key === dKey) { day = month.days[di]; break; }
    }
    if (!day) {
      day = { key: dKey, date: new Date(d.getFullYear(), d.getMonth(), d.getDate()), records: [] };
      month.days.push(day);
    }
    day.records.push(r);
  }
  return months; // months are oldest-first, days within month oldest-first, records within day oldest-first
}

function fmtMonthKey(key) {
  var parts = key.split('-');
  return parts[0] + '年' + parseInt(parts[1], 10) + '月';
}

var records = loadRecords();
var collapseState = loadCollapse();
var liveTimer = null;

// Use event delegation on the container for delete clicks
document.getElementById('recordGroups').addEventListener('click', function(e) {
  var delBtn = e.target.closest('.record-del');
  if (delBtn) {
    e.stopPropagation();
    var rid = delBtn.getAttribute('data-id');
    if (confirm('删除这条记录？')) {
      deleteRecordById(rid);
    }
    return;
  }

  var monthToggle = e.target.closest('.month-toggle');
  if (monthToggle) {
    var mk = monthToggle.getAttribute('data-month');
    toggleMonth(mk);
    return;
  }

  var dayToggle = e.target.closest('.day-toggle');
  if (dayToggle) {
    var dk = dayToggle.getAttribute('data-day');
    toggleDay(dk);
    return;
  }
});

function deleteRecordById(id) {
  for (var i = records.length - 1; i >= 0; i--) {
    if (records[i].id === id) {
      records.splice(i, 1);
      break;
    }
  }
  saveRecords(records);
  render();
}

function toggleMonth(key) {
  collapseState[key] = !collapseState[key];
  saveCollapse(collapseState);
  render();
}

function toggleDay(key) {
  collapseState[key] = !collapseState[key];
  saveCollapse(collapseState);
  render();
}

function render() {
  var container = document.getElementById('recordGroups');

  if (records.length === 0) {
    container.innerHTML = '<div class="empty"><span class="empty-icon">🕐</span>还没有记录<br>输入"睡觉"或"学习"开始记录吧</div>';
    clearInterval(liveTimer);
    return;
  }

  var months = groupAll(records);
  var now = new Date();
  var html = '';

  // Display months newest first
  for (var mi = months.length - 1; mi >= 0; mi--) {
    var month = months[mi];
    var mKey = month.key;
    var mCollapsed = collapseState[mKey];
    var mLabel = fmtMonthKey(mKey);

    // Count total records in this month
    var mCount = 0;
    for (var dc = 0; dc < month.days.length; dc++) { mCount += month.days[dc].records.length; }

    html += '<div class="month-group' + (mCollapsed ? ' collapsed' : '') + '">';
    html += '<button class="month-toggle" data-month="' + mKey + '">';
    html += '<span class="month-arrow">▼</span>';
    html += mLabel;
    html += '<span class="month-count">' + mCount + '条</span>';
    html += '</button>';
    html += '<div class="day-groups">';

    // Display days newest first
    for (var di = month.days.length - 1; di >= 0; di--) {
      var day = month.days[di];
      var dKey = day.key;
      var dCollapsed = collapseState[dKey];
      var dLabel = fmtDate(day.records[0].time);

      html += '<div class="day-group' + (dCollapsed ? ' collapsed' : '') + '">';
      html += '<button class="day-toggle" data-day="' + dKey + '">';
      html += '<span class="day-arrow">▼</span>';
      html += dLabel;
      html += '</button>';
      html += '<div class="record-list">';

      // Records within day: newest first
      for (var ri = day.records.length - 1; ri >= 0; ri--) {
        var r = day.records[ri];
        var globalIdx = -1;
        for (var k = 0; k < records.length; k++) { if (records[k].id === r.id) { globalIdx = k; break; } }
        var isLast = globalIdx === records.length - 1;

        var durHtml = '';
        if (isLast) {
          var durMin = Math.round((now - new Date(r.time)) / 60000);
          durHtml = '<div class="record-dur live">至今 · ' + fmtDuration(durMin) + '</div>';
        } else {
          var next = records[globalIdx + 1];
          var durMin2 = Math.round((new Date(next.time) - new Date(r.time)) / 60000);
          durHtml = '<div class="record-dur">持续 ' + fmtDuration(durMin2) + '</div>';
        }

        html += '<div class="record">';
        html += '<span class="record-time">' + fmtTime(r.time) + '</span>';
        html += '<div class="record-body">';
        html += '<div class="record-activity">' + escHtml(r.activity) + '</div>';
        html += durHtml;
        html += '</div>';
        html += '<button class="record-del" data-id="' + r.id + '">×</button>';
        html += '</div>';
      }

      html += '</div></div>'; // record-list, day-group
    }

    html += '</div></div>'; // day-groups, month-group
  }

  container.innerHTML = html;

  clearInterval(liveTimer);
  if (records.length > 0) {
    liveTimer = setInterval(updateLiveDurations, 30000);
  }
}

function updateLiveDurations() {
  if (records.length === 0) return;
  var last = records[records.length - 1];
  var el = document.querySelector('.record-dur.live');
  if (el) {
    var durMin = Math.round((new Date() - new Date(last.time)) / 60000);
    el.textContent = '至今 · ' + fmtDuration(durMin);
  }
}

function escHtml(s) {
  var div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function addRecord(activity) {
  var now = new Date().toISOString();
  records.push({ id: genId(), activity: activity, time: now });
  saveRecords(records);
  render();
}

document.getElementById('submitBtn').addEventListener('click', function() {
  var input = document.getElementById('activityInput');
  var val = input.value.trim();
  if (!val) return;
  addRecord(val);
  input.value = '';
  input.focus();
});

document.getElementById('activityInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('submitBtn').click();
});

var QUICK_ACTIONS = ['睡觉', '吃早饭', '吃午饭', '吃晚饭', '学习', '工作', '休息', '娱乐', '运动', '洗漱'];
function renderQuickActions() {
  var c2 = document.getElementById('quickActions');
  c2.innerHTML = QUICK_ACTIONS.map(function(a) { return '<button class="quick-btn">' + escHtml(a) + '</button>'; }).join('');
  var qbs = c2.querySelectorAll('.quick-btn');
  for (var q = 0; q < qbs.length; q++) {
    qbs[q].addEventListener('click', function() { addRecord(this.textContent); });
  }
}

function updateClock() {
  var n = new Date();
  document.getElementById('clock').textContent =
    n.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' }) +
    '  ' +
    n.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
}
updateClock();
setInterval(updateClock, 1000);

renderQuickActions();
render();
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
